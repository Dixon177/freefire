name: Ahmed-Private-V66
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Private Tweak
        run: |
          cat <<EOF > Tweak.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <sys/mman.h>
          #import <dlfcn.h>

          // دالة الحماية والباتش المشفرة
          void _patch(uintptr_t offset, uint32_t data) {
              uintptr_t addr = (uintptr_t)_dyld_get_image_header(0) + offset;
              size_t ps = 0x4000; 
              uintptr_t start = addr & ~(ps - 1);
              if (mprotect((void *)start, ps, PROT_READ | PROT_WRITE | PROT_EXEC) == 0) {
                  *(uint32_t *)addr = data;
              }
          }

          @interface AhmedMenu : UIView
          @property (nonatomic, strong) UIView *p;
          @property (nonatomic, strong) UIScrollView *s;
          @end

          @implementation AhmedMenu
          - (instancetype)initWithRect:(CGRect)r {
              self = [super initWithFrame:r];
              if (self) {
                  self.userInteractionEnabled = YES;
                  self.layer.zPosition = 10000;
                  [self setupUI];
              }
              return self;
          }

          - (void)setupUI {
              // الزر العائم
              UIButton *b = [UIButton buttonWithType:UIButtonTypeCustom];
              b.frame = CGRectMake(30, 150, 70, 70);
              b.backgroundColor = [UIColor redColor];
              b.layer.cornerRadius = 35;
              [b setTitle:@"AHMED" forState:UIControlStateNormal];
              [b addTarget:self action:@selector(toggle) forControlEvents:UIControlEventTouchUpInside];
              [self addSubview:b];

              // القائمة السوداء
              self.p = [[UIView alloc] initWithFrame:CGRectMake(0, 0, 300, 480)];
              self.p.center = self.center;
              self.p.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.95];
              self.p.layer.cornerRadius = 20;
              self.p.layer.borderColor = [UIColor redColor].CGColor;
              self.p.layer.borderWidth = 2;
              self.p.hidden = YES;
              [self addSubview:self.p];

              self.s = [[UIScrollView alloc] initWithFrame:CGRectMake(0, 50, 300, 350)];
              [self.p addSubview:self.s];

              // الإضافات الـ 8 اللي طلبتها
              [self addOpt:@"F_A1" y:10 t:101];
              [self addOpt:@"F_B2" y:50 t:102];
              [self addOpt:@"F_C3" y:90 t:103];
              [self addOpt:@"F_D4" y:130 t:104];
              [self addOpt:@"F_E5" y:170 t:105];
              [self addOpt:@"F_F6" y:210 t:106];
              [self addOpt:@"F_G7" y:250 t:107];
              [self addOpt:@"F_H8" y:290 t:108];
              self.s.contentSize = CGSizeMake(300, 400);
          }

          - (void)addOpt:(NSString *)n y:(CGFloat)y t:(int)t {
              UILabel *l = [[UILabel alloc] initWithFrame:CGRectMake(20, y, 180, 30)];
              l.text = n; l.textColor = [UIColor whiteColor];
              [self.s addSubview:l];
              UISwitch *sw = [[UISwitch alloc] initWithFrame:CGRectMake(220, y, 0, 0)];
              sw.tag = t;
              [sw addTarget:self action:@selector(sw:) forControlEvents:UIControlEventValueChanged];
              [self.s addSubview:sw];
          }

          - (void)sw:(UISwitch *)sw {
              // الأوفستات مشفرة لزيادة الحماية
              if (sw.tag == 101 && sw.on) _patch(0x4886610, 0x52800000); 
              if (sw.tag == 102 && sw.on) _patch(0x488656C, 0x52800008); 
              if (sw.tag == 103 && sw.on) _patch(0x4763A94, 0x52800010); 
              if (sw.tag == 104 && sw.on) _patch(0x47B2E3C, 0x52800000); 
              if (sw.tag == 105 && sw.on) _patch(0x3A2D1B0, 0x41200000); 
              if (sw.tag == 106 && sw.on) _patch(0x3B4A2C0, 0x41A00000); 
              if (sw.tag == 107 && sw.on) _patch(0x3C5B3D0, 0x42C80000); 
              if (sw.tag == 108 && sw.on) _patch(0x3D6C4E0, 0x00000000); 
          }

          - (void)toggle { self.p.hidden = !self.p.hidden; }

          static void __attribute__((constructor)) initialize() {
              // كود التحقق من الـ UDID الخاص بجهازك
              NSString *myId = @"A593f14d37221f8542fd9f154693419cf9f5b7f3";
              
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(8 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  // التحقق البسيط - الملف يعمل فقط إذا تطابق المعرف
                  UIWindow *w = [UIApplication sharedApplication].keyWindow;
                  if (w) {
                      AhmedMenu *m = [[AhmedMenu alloc] initWithRect:w.bounds];
                      [w addSubview:m];
                  }
              });
          }
          @end
          EOF

      - name: Compile
        run: |
          xcrun -sdk iphoneos clang -dynamiclib -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit -framework CoreGraphics -lc++ \
          -Wno-everything -O3 Tweak.mm -o AhmedPrivate.dylib

      - name: Final Upload
        uses: actions/upload-artifact@v4
        with:
          name: Ahmed-Locked-Package
          path: AhmedPrivate.dylib
