name: Ahmed-VIP-Named-V69
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Named Tweak
        run: |
          cat <<EOF > Tweak.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <sys/mman.h>

          void _patch(uintptr_t offset, uint32_t data) {
              uintptr_t addr = (uintptr_t)_dyld_get_image_header(0) + offset;
              size_t ps = 0x4000; 
              uintptr_t start = addr & ~(ps - 1);
              if (mprotect((void *)start, ps, PROT_READ | PROT_WRITE | PROT_EXEC) == 0) {
                  *(uint32_t *)addr = data;
              }
          }

          @interface AhmedMenu : UIView
          @property (nonatomic, strong) UIView *p;
          @end

          @implementation AhmedMenu
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.userInteractionEnabled = YES;
                  self.backgroundColor = [UIColor clearColor];
                  [self setupUI];
              }
              return self;
          }

          - (UIView *)hitTest:(CGPoint)point withEvent:(UIEvent *)event {
              UIView *hv = [super hitTest:point withEvent:event];
              return (hv == self) ? nil : hv;
          }

          - (void)setupUI {
              UIButton *b = [UIButton buttonWithType:UIButtonTypeCustom];
              b.frame = CGRectMake(30, 150, 70, 70);
              b.backgroundColor = [UIColor redColor];
              b.layer.cornerRadius = 35;
              [b setTitle:@"AHMED" forState:UIControlStateNormal];
              [b addTarget:self action:@selector(toggle) forControlEvents:UIControlEventTouchUpInside];
              [self addSubview:b];

              self.p = [[UIView alloc] initWithFrame:CGRectMake(0, 0, 300, 480)];
              self.p.center = self.center;
              self.p.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.95];
              self.p.layer.cornerRadius = 20;
              self.p.layer.borderColor = [UIColor redColor].CGColor;
              self.p.layer.borderWidth = 2;
              self.p.hidden = YES;
              [self addSubview:self.p];

              UIScrollView *s = [[UIScrollView alloc] initWithFrame:CGRectMake(0, 50, 300, 400)];
              [self.p addSubview:s];

              // تسمية الإضافات بأسماء واضحة
              [self addOpt:@"AIM LOCK 100%" y:10 t:101 s:s];
              [self addOpt:@"AUTO HEADSHOT" y:60 t:102 s:s];
              [self addOpt:@"ANTENNA WIRE" y:110 t:103 s:s];
              [self addOpt:@"SPEED HACK x2" y:160 t:104 s:s];
              [self addOpt:@"WALL HACK" y:210 t:105 s:s];
              [self addOpt:@"NIGHT MODE" y:260 t:106 s:s];
              [self addOpt:@"NO RECOIL" y:310 t:107 s:s];
              [self addOpt:@"GUEST RESET" y:360 t:108 s:s];

              s.contentSize = CGSizeMake(300, 420);
          }

          - (void)addOpt:(NSString *)n y:(CGFloat)y t:(int)t s:(UIScrollView *)s {
              UILabel *l = [[UILabel alloc] initWithFrame:CGRectMake(20, y, 180, 30)];
              l.text = n; l.textColor = [UIColor whiteColor];
              l.font = [UIFont boldSystemFontOfSize:14];
              [s addSubview:l];
              UISwitch *sw = [[UISwitch alloc] initWithFrame:CGRectMake(220, y, 0, 0)];
              sw.tag = t;
              [sw addTarget:self action:@selector(sw:) forControlEvents:UIControlEventValueChanged];
              [s addSubview:sw];
          }

          - (void)sw:(UISwitch *)sw {
              if (sw.tag == 101 && sw.on) _patch(0x4886610, 0x52800000); // AIM LOCK
              if (sw.tag == 102 && sw.on) _patch(0x488656C, 0x52800008); // HEADSHOT
              if (sw.tag == 103 && sw.on) _patch(0x4763A94, 0x52800010); // ANTENNA
              if (sw.tag == 104 && sw.on) _patch(0x47B2E3C, 0x52800000); // SPEED
              if (sw.tag == 105 && sw.on) _patch(0x3A2D1B0, 0x41200000); // WALL HACK
              if (sw.tag == 106 && sw.on) _patch(0x3B4A2C0, 0x41A00000); // NIGHT MODE
              if (sw.tag == 107 && sw.on) _patch(0x3C5B3D0, 0x42C80000); // NO RECOIL
              if (sw.tag == 108 && sw.on) _patch(0x3D6C4E0, 0x00000000); // GUEST RESET
          }

          - (void)toggle { self.p.hidden = !self.p.hidden; }

          static void __attribute__((constructor)) init() {
              NSString *myId = @"A593f14d37221f8542fd9f154693419cf9f5b7f3";
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 10 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  UIWindow *w = [UIApplication sharedApplication].keyWindow;
                  if (w) {
                      AhmedMenu *m = [[AhmedMenu alloc] initWithFrame:w.bounds];
                      [w addSubview:m];
                  }
              });
          }
          @end
          EOF

      - name: Build
        run: |
          xcrun -sdk iphoneos clang -dynamiclib -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit -framework CoreGraphics -lc++ \
          -Wno-everything -O3 Tweak.mm -o AhmedVIP.dylib

      - name: Final Upload
        uses: actions/upload-artifact@v4
        with:
          name: Ahmed-VIP-Named-Package
          path: AhmedVIP.dylib
