name: Ahmed-SmartTouch-V67
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Smart Tweak
        run: |
          cat <<EOF > Tweak.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <sys/mman.h>

          void _patch(uintptr_t offset, uint32_t data) {
              uintptr_t addr = (uintptr_t)_dyld_get_image_header(0) + offset;
              size_t ps = 0x4000; 
              uintptr_t start = addr & ~(ps - 1);
              if (mprotect((void *)start, ps, PROT_READ | PROT_WRITE | PROT_EXEC) == 0) {
                  *(uint32_t *)addr = data;
              }
          }

          @interface AhmedMenu : UIView
          @property (nonatomic, strong) UIView *p;
          @property (nonatomic, strong) UIButton *b;
          @end

          @implementation AhmedMenu
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.userInteractionEnabled = YES;
                  self.backgroundColor = [UIColor clearColor];
                  [self setupUI];
              }
              return self;
          }

          // هذا الكود هو اللي يحل مشكلة اللمس 100%
          - (UIView *)hitTest:(CGPoint)point withEvent:(UIEvent *)event {
              UIView *hitView = [super hitTest:point withEvent:event];
              if (hitView == self) {
                  return nil; // اللمسة تعبر للعبة إذا ما داس على المنيو
              }
              return hitView; // اللمسة تبقى للمنيو إذا داس على الزر أو القائمة
          }

          - (void)setupUI {
              self.b = [UIButton buttonWithType:UIButtonTypeCustom];
              self.b.frame = CGRectMake(30, 150, 70, 70);
              self.b.backgroundColor = [UIColor redColor];
              self.b.layer.cornerRadius = 35;
              [self.b setTitle:@"AHMED" forState:UIControlStateNormal];
              [self.b addTarget:self action:@selector(toggle) forControlEvents:UIControlEventTouchUpInside];
              [self addSubview:self.b];

              self.p = [[UIView alloc] initWithFrame:CGRectMake(0, 0, 300, 480)];
              self.p.center = self.center;
              self.p.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.95];
              self.p.layer.cornerRadius = 20;
              self.p.layer.borderColor = [UIColor redColor].CGColor;
              self.p.layer.borderWidth = 2;
              self.p.hidden = YES;
              [self addSubview:self.p];

              UIScrollView *s = [[UIScrollView alloc] initWithFrame:CGRectMake(0, 50, 300, 400)];
              [self.p addSubview:s];

              NSArray *opts = @[@"F_A1", @"F_B2", @"F_C3", @"F_D4", @"F_E5", @"F_F6", @"F_G7", @"F_H8"];
              for (int i = 0; i < opts.count; i++) {
                  UILabel *l = [[UILabel alloc] initWithFrame:CGRectMake(20, 10+(i*50), 180, 30)];
                  l.text = opts[i]; l.textColor = [UIColor whiteColor];
                  [s addSubview:l];
                  UISwitch *sw = [[UISwitch alloc] initWithFrame:CGRectMake(220, 10+(i*50), 0, 0)];
                  sw.tag = 101 + i;
                  [sw addTarget:self action:@selector(sw:) forControlEvents:UIControlEventValueChanged];
                  [s addSubview:sw];
              }
              s.contentSize = CGSizeMake(300, 450);
          }

          - (void)sw:(UISwitch *)sw {
              if (sw.tag == 101 && sw.on) _patch(0x4886610, 0x52800000);
              if (sw.tag == 102 && sw.on) _patch(0x488656C, 0x52800008);
              if (sw.tag == 103 && sw.on) _patch(0x4763A94, 0x52800010);
              if (sw.tag == 104 && sw.on) _patch(0x47B2E3C, 0x52800000);
              if (sw.tag == 105 && sw.on) _patch(0x3A2D1B0, 0x41200000);
              if (sw.tag == 106 && sw.on) _patch(0x3B4A2C0, 0x41A00000);
              if (sw.tag == 107 && sw.on) _patch(0x3C5B3D0, 0x42C80000);
              if (sw.tag == 108 && sw.on) _patch(0x3D6C4E0, 0x00000000);
          }

          - (void)toggle { self.p.hidden = !self.p.hidden; }

          static void __attribute__((constructor)) init() {
              NSString *myId = @"A593f14d37221f8542fd9f154693419cf9f5b7f3";
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 10 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  UIWindow *w = [UIApplication sharedApplication].keyWindow;
                  if (w) {
                      AhmedMenu *m = [[AhmedMenu alloc] initWithFrame:w.bounds];
                      [w addSubview:m];
                  }
              });
          }
          @end
          EOF

      - name: Build
        run: |
          xcrun -sdk iphoneos clang -dynamiclib -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit -framework CoreGraphics -lc++ \
          -Wno-everything -O3 Tweak.mm -o AhmedPrivate.dylib

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Ahmed-SmartTouch-Package
          path: AhmedPrivate.dylib
